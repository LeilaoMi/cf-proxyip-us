name: ProxyIP Auto Update

on:
  schedule:
    - cron: "17 */3 * * *"
  workflow_dispatch:

concurrency:
  group: proxyip-auto-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Wrangler
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Wrangler
        run: npm install -g wrangler@4

      - name: Run ProxyIP auto update
        run: python3 scripts/auto_update.py
