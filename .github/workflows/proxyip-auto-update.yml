name: ProxyIP Auto Update

on:
  schedule:
    - cron: "17 */3 * * *"
  workflow_dispatch:

concurrency:
  group: proxyip-auto-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CLOUDFLARE_ACCOUNT_ID: 7a008dc2b0c06b522b5a1aed2b628755
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      PROXYIP_HMAC_SECRET: ${{ secrets.PROXYIP_HMAC_SECRET }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Wrangler
        run: npm install -g wrangler@4

      - name: Syntax check
        run: |
          python3 -m py_compile build_dataset.py scripts/*.py
          node --check worker.js

      - name: Generate, validate, and test outputs
        run: |
          python3 build_dataset.py
          python3 scripts/validate_outputs.py
          python3 -m unittest discover -s tests

      - name: Run ProxyIP auto update
        env:
          PROXYIP_SKIP_GENERATE: "1"
        run: python3 scripts/auto_update.py
